spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8087}

spring.application.name=${APP_NAME:API-GATEWAY}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/customers/**,/pets/**
spring.cloud.gateway.routes[0].filters[0]=JwtFilter

spring.cloud.gateway.routes[1].id=vet-service
spring.cloud.gateway.routes[1].uri=lb://VET-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/vets/**
spring.cloud.gateway.routes[1].filters[0]=JwtFilter

spring.cloud.gateway.routes[2].id=visit-service
spring.cloud.gateway.routes[2].uri=lb://VISIT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/visit/**
spring.cloud.gateway.routes[2].filters[0]=JwtFilter

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/**
spring.cloud.gateway.routes[3].filters[0]=JwtFilter

spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/auth/**

spring.cloud.gateway.routes[5].id=auth-service-docs
spring.cloud.gateway.routes[5].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/auth-service/v3/api-docs
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/auth-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[6].id=customer-service-docs
spring.cloud.gateway.routes[6].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/customer-service/v3/api-docs
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/customer-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[7].id=vet-service-docs
spring.cloud.gateway.routes[7].uri=lb://VET-SERVICE
spring.cloud.gateway.routes[7].predicates[0]=Path=/vet-service/v3/api-docs
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/vet-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[8].id=visit-service-docs
spring.cloud.gateway.routes[8].uri=lb://VISIT-SERVICE
spring.cloud.gateway.routes[8].predicates[0]=Path=/visit-service/v3/api-docs
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/visit-service/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[9].id=admin-service-docs
spring.cloud.gateway.routes[9].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[9].predicates[0]=Path=/admin-service/v3/api-docs
spring.cloud.gateway.routes[9].filters[0]=RewritePath=/admin-service/(?<segment>.*), /$\{segment}

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.pamperpaw.gateway=INFO
logging.file.name=${LOG_FILE_NAME:logs/api-gateway.log}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
jwt.secret=${JWT_SECRET}
internal.service.key=${INTERNAL_SERVICE_KEY:pamper-paws-internal-dev-key}

springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Customer Service
springdoc.swagger-ui.urls[1].url=/customer-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Vet Service
springdoc.swagger-ui.urls[2].url=/vet-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=Visit Service
springdoc.swagger-ui.urls[3].url=/visit-service/v3/api-docs
springdoc.swagger-ui.urls[4].name=Admin Service
springdoc.swagger-ui.urls[4].url=/admin-service/v3/api-docs
