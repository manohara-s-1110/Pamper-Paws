spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8087}

spring.application.name=${APP_NAME:API-GATEWAY}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

spring.cloud.gateway.routes[0].id=customer-service
spring.cloud.gateway.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/customers/**,/pets/**
spring.cloud.gateway.routes[0].filters[0]=JwtFilter

spring.cloud.gateway.routes[1].id=vet-service
spring.cloud.gateway.routes[1].uri=lb://VET-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/vets/**
spring.cloud.gateway.routes[1].filters[0]=JwtFilter

spring.cloud.gateway.routes[2].id=visit-service
spring.cloud.gateway.routes[2].uri=lb://VISIT-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/visit/**
spring.cloud.gateway.routes[2].filters[0]=JwtFilter

spring.cloud.gateway.routes[3].id=admin-service
spring.cloud.gateway.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/admin/**
spring.cloud.gateway.routes[3].filters[0]=JwtFilter

spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/auth/**

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.pamperpaw.gateway=INFO
logging.file.name=${LOG_FILE_NAME:logs/api-gateway.log}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
jwt.secret=${JWT_SECRET}
