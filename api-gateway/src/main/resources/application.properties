spring.config.import=optional:file:.env[.properties]

server.port=${SERVER_PORT:8087}

spring.application.name=${APP_NAME:API-GATEWAY}

eureka.client.service-url.defaultZone=${EUREKA_SERVER_URL:http://localhost:8761/eureka}

spring.cloud.gateway.server.webflux.routes[0].id=customer-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/customers/**,/pets/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=JwtFilter

spring.cloud.gateway.server.webflux.default-filters[0]=DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials RETAIN_UNIQUE

spring.cloud.gateway.server.webflux.routes[1].id=vet-service
spring.cloud.gateway.server.webflux.routes[1].uri=lb://VET-SERVICE
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/vets/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=JwtFilter

spring.cloud.gateway.server.webflux.routes[2].id=visit-service
spring.cloud.gateway.server.webflux.routes[2].uri=lb://VISIT-SERVICE
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/visit,/visit/**,/visits,/visits/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=JwtFilter

spring.cloud.gateway.server.webflux.routes[3].id=admin-service
spring.cloud.gateway.server.webflux.routes[3].uri=lb://ADMIN-SERVICE
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/admin/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=JwtFilter

spring.cloud.gateway.server.webflux.routes[4].id=auth-service
spring.cloud.gateway.server.webflux.routes[4].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[5].id=payment-service
spring.cloud.gateway.server.webflux.routes[5].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/payments/**
spring.cloud.gateway.server.webflux.routes[5].filters[0]=JwtFilter

logging.level.org.springframework.cloud.gateway=INFO
logging.level.com.pamperpaw.gateway=INFO
logging.file.name=${LOG_FILE_NAME:logs/api-gateway.log}
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
jwt.secret=${JWT_SECRET}
internal.service.key=${INTERNAL_SERVICE_KEY:pamper-paws-internal-dev-key}

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.urls[0].name=API Gateway
springdoc.swagger-ui.urls[0].url=/v3/api-docs
springdoc.swagger-ui.urls[1].name=Auth Service
springdoc.swagger-ui.urls[1].url=/v3/api-docs/auth
springdoc.swagger-ui.urls[2].name=Customer Service
springdoc.swagger-ui.urls[2].url=/v3/api-docs/customers
springdoc.swagger-ui.urls[3].name=Vet Service
springdoc.swagger-ui.urls[3].url=/v3/api-docs/vets
springdoc.swagger-ui.urls[4].name=Visit Service
springdoc.swagger-ui.urls[4].url=/v3/api-docs/visits
springdoc.swagger-ui.urls[5].name=Payment Service
springdoc.swagger-ui.urls[5].url=/v3/api-docs/payments

spring.cloud.gateway.server.webflux.routes[6].id=auth-service-openapi
spring.cloud.gateway.server.webflux.routes[6].uri=lb://AUTH-SERVICE
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/v3/api-docs/auth
spring.cloud.gateway.server.webflux.routes[6].filters[0]=RewritePath=/v3/api-docs/auth,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[7].id=customer-service-openapi
spring.cloud.gateway.server.webflux.routes[7].uri=lb://CUSTOMER-SERVICE
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/v3/api-docs/customers
spring.cloud.gateway.server.webflux.routes[7].filters[0]=RewritePath=/v3/api-docs/customers,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[8].id=vet-service-openapi
spring.cloud.gateway.server.webflux.routes[8].uri=lb://VET-SERVICE
spring.cloud.gateway.server.webflux.routes[8].predicates[0]=Path=/v3/api-docs/vets
spring.cloud.gateway.server.webflux.routes[8].filters[0]=RewritePath=/v3/api-docs/vets,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[9].id=visit-service-openapi
spring.cloud.gateway.server.webflux.routes[9].uri=lb://VISIT-SERVICE
spring.cloud.gateway.server.webflux.routes[9].predicates[0]=Path=/v3/api-docs/visits
spring.cloud.gateway.server.webflux.routes[9].filters[0]=RewritePath=/v3/api-docs/visits,/v3/api-docs

spring.cloud.gateway.server.webflux.routes[10].id=payment-service-openapi
spring.cloud.gateway.server.webflux.routes[10].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[10].predicates[0]=Path=/v3/api-docs/payments
spring.cloud.gateway.server.webflux.routes[10].filters[0]=RewritePath=/v3/api-docs/payments,/v3/api-docs
